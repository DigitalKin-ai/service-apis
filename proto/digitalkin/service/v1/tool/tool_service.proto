syntax = "proto3";

package digitalkin.service.v1.tool;

import "google/protobuf/struct.proto";
import "validate/validate.proto";

service ToolService {
    rpc ExecuteTool(ExecuteRequest) returns (ExecuteResponse);
}

message ExecuteRequest {
    google.protobuf.Struct input = 2 [(validate.rules).any = { required: true }];
}

message ExecuteResponse {
    bool success = 1;
    google.protobuf.Struct output = 2 [(validate.rules).any = { required: true }];
}
