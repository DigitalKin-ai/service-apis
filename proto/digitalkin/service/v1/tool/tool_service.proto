syntax = "proto3";

package digitalkin.service.v1.tool;

import "validate/validate.proto";
import "google/protobuf/any.proto";

service ToolService {
    rpc ExecuteTool(ExecuteRequest) returns (ExecuteResponse);
}

message ExecuteRequest {
    google.protobuf.Any input = 1 [(validate.rules).any.required = true];
}

message ExecuteResponse {
    google.protobuf.Any output = 2 [(validate.rules).any.required = true];
    bool success = 1;
}
